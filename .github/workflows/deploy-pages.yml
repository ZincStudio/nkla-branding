name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: Generate preview from DESIGN.md
        run: python3 spec-ia/spec/build-preview.py
      
      - name: Prepare preview assets
        run: |
          mkdir -p _site
          cp spec-ia/index.html _site/
          mkdir -p _site/spec
          cp spec-ia/spec/DESIGN.md _site/spec/DESIGN.md
          cp spec-ia/spec/DESIGN.md _site/NKL-Assistance-DESIGN.md
          cp spec-ia/spec/preview.html _site/
          cp -r assets _site/assets
          cp CNAME _site/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
